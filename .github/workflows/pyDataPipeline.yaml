name: Python FAIR Data Pipeline
on: [push]
jobs:
  test:
    name: Test ${{ matrix.os }} (Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2019] #,ubuntu-20.04,macos-latest]
        python: ["3.10.2"] #, "3.7" ,"3.8", "3.9"]
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python }}
          architecture: "x64"
      - name: Install graphviz
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
              sudo apt-get install graphviz
          elif [ "$RUNNER_OS" == "Windows" ]; then
              choco install graphviz
          elif [ "$RUNNER_OS" == "Darwin" ]; then
              brew install graphviz
          fi
        shell: bash
      - name: Install local registry
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then
              curl -fsSL https://data.scrc.uk/static/localregistry.sh | /bin/bash -s -- -b main
          fi
        shell: bash
      - name: install local registry on windows
        shell: cmd
        if: ${{ matrix.os  == 'windows-2019' }}
#         if: ${{ matrix.os  == 'windows-latest' && matrix.python != '3.10.2' }}
        run: |
          choco install wget
          md %userprofile%\.fair
          cd /d %userprofile%\.fair
          echo %CD%
          pip install --upgrade pip
          set FAIR_HOME="%homedrive%%homepath%\.fair\registry"
          mkdir %FAIR_HOME%

          :: Clone the registry into the directory
          git clone https://github.com/FAIRDataPipeline/data-registry.git %FAIR_HOME%

          :: install Virtual Environment Module
          python -m venv %FAIR_HOME%/venv

          :: Activate the Virtual Environment
          echo calling "%FAIR_HOME:"=%\venv\scripts\activate.bat" to activate virtual enviroment
          call %FAIR_HOME:"=%\venv\Scripts\activate.bat"

          :: Install Python Dependencies
          python -m pip install --upgrade pip wheel
          sed -i "s/lxml==4.6.3/lxml==4.8.0/"  "%FAIR_HOME:"=%\local-requirements.txt"
          python -m pip install -r "%FAIR_HOME:"=%\local-requirements.txt"
          
          :: Change into FAIR HOME directory
          cd %FAIR_HOME%

          :: Set Environment Variables needed for Django
          setx DJANGO_SETTINGS_MODULE "drams.local-settings"
          setx DJANGO_SUPERUSER_USERNAME admin
          setx DJANGO_SUPERUSER_PASSWORD admin

          :: Because Windows use refreshenv from chocolatey to refresh environmental variables without restart
          echo refreshing enviromental variables
          call refreshenv

          :: Reactivate Virtual Environment after refreshing environmental variables
          echo calling "%FAIR_HOME:"=%\venv\scripts\activate.bat" to activate virtual enviroment
          call %FAIR_HOME:"=%\venv\Scripts\activate.bat

          :: Run Migrations
          echo running migrations
          python manage.py makemigrations custom_user
          python manage.py makemigrations data_management
          python manage.py migrate
          python manage.py graph_models data_management --arrow-shape crow -X "BaseModel,DataObject,DataObjectVersion" -E -o %FAIR_HOME:"=%\schema.dot
          python manage.py collectstatic --noinput > nul 2>&1
          python manage.py createsuperuser --noinput
      - name: Install Required
        run: brew install memcached
        if: matrix.os == 'macos-latest'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Checkout pySimpleModel
        uses: actions/checkout@v2
        with:
          repository: FAIRDataPipeline/pySimpleModel
          path: pySimpleModel
      - name: Move pySimpleModel
        run: mv pySimpleModel ../pySimpleModel
      - name: Run Tests on Windows
        run: |
          pip3 install --upgrade pip
          poetry install
          pip3 install fair-cli
          pip3 install ../pySimpleModel
          fair init --ci
          fair registry start
          fair pull data_pipeline_api/ext/SEIRSconfig.yaml
          fair run data_pipeline_api/ext/SEIRSconfig.yaml

          poetry run pytest --cov=data_pipeline_api  --cov-report=xml --cov-report=term -s tests/
        if: ${{ matrix.os  == 'windows-2019' }}
#         if: ${{ matrix.os  == 'windows-latest' &&  matrix.python  != '3.10.2' }}    
      - name: Run Tests on other OS
        if: matrix.os != 'windows-2019'
        run: |
          poetry install
          source .venv/bin/activate
          pip install fair-cli
          pip install ../pySimpleModel
          fair init --ci
          fair registry start
          fair pull data_pipeline_api/ext/SEIRSconfig.yaml
          fair run data_pipeline_api/ext/SEIRSconfig.yaml

          python3 -m poetry run pytest --cov=data_pipeline_api  --cov-report=xml --cov-report=term -s tests/
      - uses: codecov/codecov-action@v2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        if: matrix.python == '3.9' && matrix.os == 'ubuntu-20.04'
